{% extends 'base.html' %}

{% block content %}
<div class="space-y-6">
    <h2 class="text-2xl font-bold text-white tracking-tight">Visão Geral</h2>
    
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-[#0e0e11] border border-[#1f1f23] p-6 rounded-xl">
            <h3 class="text-[#71717a] text-xs font-bold uppercase tracking-wider">Total de Clientes</h3>
            <p class="text-3xl font-black mt-2">{{ metrics.total_clientes }}</p>
        </div>
        
        <div class="bg-[#0e0e11] border border-[#1f1f23] p-6 rounded-xl">
            <h3 class="text-[#71717a] text-xs font-bold uppercase tracking-wider">Total de Vendas</h3>
            <p class="text-3xl font-black mt-2">{{ metrics.total_vendas }}</p>
        </div>

        <div class="bg-[#0e0e11] border border-[#1f1f23] p-6 rounded-xl">
            <h3 class="text-[#71717a] text-xs font-bold uppercase tracking-wider">Faturamento</h3>
            <p class="text-3xl font-black mt-2">{{ metrics.faturamento | formatar_moeda }}</p>
        </div>
    </div>
</div>
{% endblock %}
