{% extends "base.html" %}

{% block content %}
<h2 class="text-xl font-black text-white uppercase tracking-widest mb-6">Condicionais por Cliente</h2>

<form action="/condicionais" method="POST" class="mb-8 p-6 bg-[#0e0e11] rounded-xl border border-[#1f1f23] grid grid-cols-1 md:grid-cols-3 gap-4">
    <div>
        <label class="block text-xs text-[#71717a] uppercase mb-1">Cliente</label>
        <input list="lista-clientes" name="cliente_nome" placeholder="Digite o nome do cliente..." required
            class="w-full bg-[#18181b] border border-[#27272a] p-2 text-white rounded">
        <datalist id="lista-clientes">
            {% for cliente in clientes %}
            <option value="{{ cliente.nome }}">
            {% endfor %}
        </datalist>
    </div>

    <div>
        <label class="block text-xs text-[#71717a] uppercase mb-1">SKU do Produto</label>
        <input type="text" name="sku" required placeholder="Ex: CAMISA-PRETA-G"
            class="w-full bg-[#18181b] border border-[#27272a] p-2 text-white rounded">
    </div>

    <div>
        <label class="block text-xs text-[#71717a] uppercase mb-1">Preço</label>
        <input type="number" step="0.01" name="preco_venda" required placeholder="0.00"
            class="w-full bg-[#18181b] border border-[#27272a] p-2 text-white rounded">
    </div>

    <button type="submit" class="md:col-span-3 bg-white text-black py-2 rounded-lg font-bold uppercase text-xs hover:bg-gray-200 transition">
        Adicionar item à condicional
    </button>
</form>

<div class="bg-[#0e0e11] p-6 rounded-xl border border-[#1f1f23]">
    <h3 class="text-lg font-bold text-white mb-4">Itens em Posse</h3>
    
    <table class="w-full text-left">
        <thead>
            <tr class="text-[#71717a] text-xs uppercase">
                <th class="pb-4">SKU</th>
                <th class="pb-4">Preço</th>
                <th class="pb-4">Data</th>
            </tr>
        </thead>
        <tbody>
            {% for item in condicionais %}
            <tr class="border-t border-[#1f1f23] text-white">
                <td class="py-3">{{ item.sku }}</td>
                <td class="py-3">R$ {{ item.preco_venda }}</td>
                <td class="py-3 text-[#71717a] text-sm">{{ item.created_at[:10] if item.created_at else '---' }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
